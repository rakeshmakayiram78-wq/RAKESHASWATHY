<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <title>Aswathy & Rakesh Wedding</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
  <h1 class="names">Aswathy & Rakesh</h1>
  <p class="date">May 1, 2026</p>
  <div class="hero-image">
   <img class="main-photo" src="./IMG_4149.jpeg" alt="couple photo">
  </div>
</section>

<section class="section">
  <h2>May 1, 2026</h2>
  <div id="countdown"></div>
</section>

<section class="section">
  <h2>Our Story</h2>
  <p>From a simple hello to forever ❤️</p>
</section>

<section class="section">
  <h2>Events & Venue</h2>

  <div class="venues">

    <div class="venue-box">
      <h3>💍 Wedding Ceremony</h3>
      <p>Karthigai Mahal, Munnar</p>
      <iframe 
        src="https://maps.google.com/maps?q=Karthigai%20Mahal%20Munnar&t=&z=13&ie=UTF8&iwloc=&output=embed">
      </iframe>
    </div>

    <div class="venue-box">
      <h3>🎉 Reception</h3>
      <p>Alleppey Beach Resort, Alappuzha</p>
      <iframe 
        src="https://maps.google.com/maps?q=Alleppey%20Beach%20Resort%20Alappuzha&t=&z=13&ie=UTF8&iwloc=&output=embed">
      </iframe>
    </div>

  </div>
</section>

<section class="section">
  <h2>Gallery</h2>
  <div class="slideshow-container">
    <div class="slide-wrapper">
      <img class="slide" src="./IMG_4148.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4149.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4150.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4151.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4152.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_A4536.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4541.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4545.jpeg" alt="Gallery Photo">
    </div>
  </div>
</section>


<section class="footer">
  <p>With Love ❤️ Aswathy & Rakesh</p>
</section>

<script src="script.js"></script>
</body>
</html>
