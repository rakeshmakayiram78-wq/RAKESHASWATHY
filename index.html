<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aswathy & Rakesh Wedding</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1 class="names">Aswathy & Rakesh</h1>
  <p class="date">May 1, 2026</p>
  <img class="main-photo" src="./IMG_4446.jpeg" alt="Couple Photo" onerror="this.style.display='none'">
</section>

<!-- COUNTDOWN -->
<section class="section">
  <h2>Countdown to Wedding</h2>
  <div id="countdown"></div>
</section>

<!-- OUR STORY -->
<section class="section">
  <h2>Our Story</h2>
  <p>From a simple hello to forever ❤️</p>
</section>

<!-- EVENTS -->
<section class="section">
  <h2>Events & Venue</h2>

  <div class="venues">
    <div class="venue-box">
      <h3>💍 Wedding Ceremony</h3>
      <p><strong>01/05/2026</strong></p>
      <p>Karthigai Mahal, Munnar</p>
      <iframe src="https://maps.google.com/maps?q=Karthigai%20Mahal%20Munnar&output=embed"></iframe>
    </div>

    <div class="venue-box">
      <h3>🎉 Reception</h3>
      <p><strong>03/05/2026</strong></p>
      <p>Alleppey Beach Resort, Alappuzha</p>
      <iframe src="https://maps.google.com/maps?q=Alleppey%20Beach%20Resort%20Alappuzha&output=embed"></iframe>
    </div>
  </div>

</section>

<!-- GALLERY -->
<section class="section">
  <h2>Gallery</h2>

  <div class="slideshow-container">
    
    <!-- FIXED -->
    <img class="slide" src="./IMG_3885.jpeg" onerror="this.remove()">
    <img class="slide" src="./IMG_4846 (1).jpeg" onerror="this.remove()">

    <!-- Others -->
    <img class="slide" src="./IMG_5555.jpeg" onerror="this.remove()">
    <img class="slide" src="./IMG_4832.jpeg" onerror="this.remove()">
    <img class="slide" src="./IMG_4444.jpeg" onerror="this.remove()">
    <img class="slide" src="./IMG_4149.jpeg" onerror="this.remove()">
    <img class="slide" src="./IMG_4150.jpeg" onerror="this.remove()">
    <img class="slide" src="./IMG_4151.jpeg" onerror="this.remove()">
    <img class="slide" src="./IMG_4844.jpeg" onerror="this.remove()">
    <img class="slide" src="./IMG_4545.jpeg" onerror="this.remove()">
    <img class="slide" src="./IMG_4845.jpeg" onerror="this.remove()">
    <img class="slide" src="./IMG_4841.jpeg" onerror="this.remove()">

  </div>
</section>

<!-- FOOTER -->
<section class="footer">
  <p>With Love ❤️ Aswathy & Rakesh</p>
</section>

<script src="script.js"></script>

</body>
</html>
