<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aswathy & Rakesh Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
 
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <h1 class="names">Aswathy & Rakesh</h1>
    <p class="date">May 1, 2026</p>
    <img class="main-photo" src="./IMG_4446.jpeg" alt="Couple Photo">
  </section>

  <!-- COUNTDOWN -->
  <section class="section">
    <h2>Countdown to Wedding</h2>
    <div id="countdown"></div>
  </section>

  <!-- OUR STORY -->
  <section class="section">
    <h2>Our Story</h2>
    <p>From a simple hello to forever ❤️</p>
  </section>

  <!-- EVENTS & VENUE -->
  <section class="section">
    <h2>Events & Venue</h2>
    <div class="venues">
      <div class="venue-box">
        <h3>💍 Wedding Ceremony</h3>
        <p>Karthigai Mahal, Munnar</p>
        <iframe src="https://maps.google.com/maps?q=Karthigai%20Mahal%20Munnar&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
      </div>
      <div class="venue-box">
        <h3> 🎉  Reception
        at</h3>
        <p>Alleppey Beach Resort, Alappuzha</p>
        <iframe src="https://maps.google.com/maps?q=Alleppey%20Beach%20Resort%20Alappuzha&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
      </div>
    </div>
  </section>

  <!-- GALLERY -->
  <section class="section">
    <h2>Gallery</h2>
    <div class="slideshow-container">
      <img class="slide" src="./IMG_4444.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4149.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4150.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4151.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4152.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_A4536.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4541.jpeg" alt="Gallery Photo">
      <img class="slide" src="./IMG_4545.jpeg" alt="Gallery Photo">
    </div>
  </section>

  <!-- FOOTER -->
  <section class="footer">
    <p>With Love ❤️ Aswathy & Rakesh</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
